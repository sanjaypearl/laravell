version: 2.1

jobs:
  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - add_ssh_keys:
          fingerprints:
            - "SHA256:uCtOaAnO5Ry9H0y2uy0j5RjqniUljjkaR+fC4zyUF0I"
      - run:
          name: Add VPS to known hosts
          command: |
            mkdir -p ~/.ssh
            ssh-keyscan -H $host >> ~/.ssh/known_hosts
      - run:
          name: Say Hello on VPS
          command: ssh $vps_user@$host "echo hello"

workflows:
  build-test-deploy:
    jobs:
      - deploy













